





<!DOCTYPE html>
<html>
<head>
  <title>HopeRepublic Quiz</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>





<div class="quiz-container">
  <h1 id="quiz-title">Loading Quiz...</h1>

  <div id="progress"></div>

  <div id="question-container">
    <h2 id="question-text"></h2>
    <div id="options-container"></div>
  </div>

  <button id="skip-btn">Skip</button>
</div>

<div id="shareSection" class="share-section">
  <button id="shareBtn">Share Result</button>
  <button id="copyBtn">Copy Link</button>

  <div class="social-buttons">
    <a id="facebookShare" target="_blank">Facebook</a>
    <a id="twitterShare" target="_blank">Twitter</a>
    <a id="whatsappShare" target="_blank">WhatsApp</a>
  </div>
</div>
